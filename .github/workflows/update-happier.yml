name: Update happier input

on:
  # Triggered from happier repo via repository_dispatch
  repository_dispatch:
    types: [happier-release]
  # Fallback: check daily
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  update:
    name: Check for new happier release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check for happier update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: nix run .#update-happier

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet flake.nix flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build to verify
        if: steps.changes.outputs.changed == 'true'
        run: nix flake check

      - name: Create PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(grep 'github:happier-dev/happier/' flake.nix \
            | sed 's|.*github:happier-dev/happier/||;s|".*||')
          BRANCH="update-happier/$TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add flake.nix flake.lock
          git commit -m "chore: update happier input to $TAG"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update happier to $TAG" \
            --body "Automated update of happier input to release $TAG."
