name: CI — Nix Builds

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build-x86_64-linux:
    name: Nix Build (x86_64-linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build happier-cli
        run: nix build .#packages.x86_64-linux.happier-cli

      - name: Build happier-server
        run: nix build .#packages.x86_64-linux.happier-server

      - name: Check formatting
        run: nix fmt -- --fail-on-change

  nix-build-aarch64-darwin:
    name: Nix Build (aarch64-darwin)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build happier-cli
        run: nix build .#packages.aarch64-darwin.happier-cli

      - name: Build happier-server
        run: nix build .#packages.aarch64-darwin.happier-server

  nix-build-aarch64-linux:
    name: Nix Build (aarch64-linux via QEMU)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU for aarch64
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable qemu-aarch64

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: extra-platforms = aarch64-linux

      - name: Build happier-cli
        run: nix build .#packages.aarch64-linux.happier-cli --system aarch64-linux

      - name: Build happier-server
        run: nix build .#packages.aarch64-linux.happier-server --system aarch64-linux

      - name: Evaluate NixOS module
        run: nix eval .#nixosModules.happier-server
